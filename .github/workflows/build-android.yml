name: Build Android

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Mismaiti session ID (for build callback)'
        required: true
        type: string
      callback_url:
        description: 'Backend callback URL (e.g. https://api.mismaiti.com)'
        required: true
        type: string
      callback_token:
        description: 'Short-lived callback token for build-complete authentication'
        required: true
        type: string
      enable_unit_tests:
        description: 'Enable unit tests'
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run unit tests
        if: inputs.enable_unit_tests
        run: ./gradlew testDebugUnitTest
        continue-on-error: false

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Get APK info
        id: apk_info
        run: |
          DEBUG_APK=$(find composeApp/build/outputs/apk/debug -name "*.apk" | head -n 1)
          RELEASE_APK=$(find composeApp/build/outputs/apk/release -name "*.apk" | head -n 1)

          if [ -f "$DEBUG_APK" ]; then
            DEBUG_SIZE=$(du -h "$DEBUG_APK" | cut -f1)
            echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
            echo "debug_size=$DEBUG_SIZE" >> $GITHUB_OUTPUT
            echo "✓ Debug APK: $DEBUG_SIZE"
          fi

          if [ -f "$RELEASE_APK" ]; then
            RELEASE_SIZE=$(du -h "$RELEASE_APK" | cut -f1)
            echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT
            echo "release_size=$RELEASE_SIZE" >> $GITHUB_OUTPUT
            echo "✓ Release APK: $RELEASE_SIZE"
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: steps.apk_info.outputs.debug_apk != ''
        with:
          name: app-debug
          path: ${{ steps.apk_info.outputs.debug_apk }}
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        if: steps.apk_info.outputs.release_apk != ''
        with:
          name: app-release
          path: ${{ steps.apk_info.outputs.release_apk }}
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "## Android Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "${{ steps.apk_info.outputs.debug_apk }}" ]; then
            echo "**Debug APK:** ${{ steps.apk_info.outputs.debug_size }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "${{ steps.apk_info.outputs.release_apk }}" ]; then
            echo "**Release APK:** ${{ steps.apk_info.outputs.release_size }}" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** ${{ inputs.enable_unit_tests && 'Enabled' || 'Disabled' }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: inputs.enable_unit_tests && always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            composeApp/build/test-results/**/*.xml
            composeApp/build/reports/tests/
          retention-days: 7

      - name: Notify backend (build complete)
        if: always() && inputs.session_id != '' && inputs.callback_url != ''
        run: |
          STATUS="failure"
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
          fi
          curl -s -X POST "${{ inputs.callback_url }}/api/v1/build-complete" \
            -H "Content-Type: application/json" \
            -d "{\"session_id\": \"${{ inputs.session_id }}\", \"platform\": \"android\", \"status\": \"${STATUS}\", \"workflow_run_id\": \"${{ github.run_id }}\", \"callback_token\": \"${{ inputs.callback_token }}\"}" \
            || echo "Warning: build callback failed (non-fatal)"
